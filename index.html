<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | NFT preview card component</title>
  </head>
  <body>
    <main>
      <div class="card">
        <div class="img-container">
          <img
            src="./images/image-equilibrium.jpg"
            alt="image of cube standing on surface with its corner"
            class="card-img"
          />
          <img
            src="./images/icon-view.svg"
            alt=""
            class="view-icon small-img"
          />
        </div>
        <h1 class="title">Equilibrium #3429</h1>
        <p class="description">
          Our Equilibrium collection promotes balance and calm.
        </p>
        <div class="info">
          <span class="currency">
            <img src="./images/icon-ethereum.svg" class="small-img" alt="" />
            &nbsp;0.041 ETH
          </span>
          <span class="time-left">
            <img src="./images/icon-clock.svg" class="small-img" alt="" />
            &nbsp;3 days left
          </span>
        </div>
        <div class="divider"></div>
        <div class="footer">
          <img
            src="./images/image-avatar.png"
            alt="author photo with decreases size"
            class="avatar small-img"
          />
          <span class="author"
            >Creation of <span class="author-name">Jules Wyvern</span></span
          >
        </div>
      </div>
    </main>
  </body>
</html>
